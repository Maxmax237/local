<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack LMS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* STYLES SIMPLES ET BEAUX */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* MENU */
        nav { background: #2c3e50; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 5px; }
        nav a { color: white; text-decoration: none; padding: 15px 20px; display: inline-block; transition: 0.3s; font-weight: 500; }
        nav a:hover { background: #667eea; }
        nav i { margin-right: 8px; }
        
        /* CONTENU */
        .content { padding: 30px; }
        
        h1 { color: #2c3e50; margin-bottom: 25px; font-size: 28px; border-left: 5px solid #667eea; padding-left: 15px; }
        
        /* CARTES STATS */
        .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 25px; border-radius: 15px; flex: 1; min-width: 150px; text-align: center; }
        .stat-card h2 { font-size: 36px; margin-bottom: 10px; }
        .stat-card p { opacity: 0.9; }
        
        /* GRILLES */
        .grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .card { background: #f8f9fa; border-radius: 12px; padding: 20px; width: calc(33% - 14px); min-width: 250px; transition: transform 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card h3 { color: #667eea; margin-bottom: 10px; }
        .card p { color: #666; margin: 5px 0; font-size: 14px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 10px; }
        .badge-debutant { background: #28a745; color: white; }
        .badge-intermediaire { background: #ffc107; color: #333; }
        .badge-avance { background: #dc3545; color: white; }
        
        /* PROGRESS BAR */
        .progress { background: #e0e0e0; border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: #667eea; height: 100%; border-radius: 10px; }
        
        /* TABLEAUX */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; }
        tr:hover { background: #f5f5f5; }
        
        /* BOUTONS */
        .btn { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 5px; }
        .btn:hover { background: #5a67d8; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-add { background: #28a745; margin-bottom: 20px; }
        
        /* ANNONCES */
        .annonce { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #667eea; }
        .annonce-urgent { border-left-color: #dc3545; background: #fff5f5; }
        .annonce-important { border-left-color: #ffc107; background: #fffbf0; }
        
        @media (max-width: 768px) {
            .card { width: 100%; }
            nav a { padding: 10px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <a href="#" onclick="changerPage('dashboard')"><i class="fas fa-tachometer-alt"></i> Tableau de bord</a>
        <a href="#" onclick="changerPage('courses')"><i class="fas fa-book"></i> Cours</a>
        <a href="#" onclick="changerPage('students')"><i class="fas fa-users"></i> Apprenants</a>
        <a href="#" onclick="changerPage('progress')"><i class="fas fa-chart-line"></i> Suivi</a>
        <a href="#" onclick="changerPage('quizzes')"><i class="fas fa-puzzle-piece"></i> Quiz</a>
        <a href="#" onclick="changerPage('announcements')"><i class="fas fa-bullhorn"></i> Annonces</a>
    </nav>
    <div class="content" id="main-content">
        <h1>Chargement...</h1>
    </div>
</div>

<script src="app.js"></script>
<script>
    // RENDU SIMPLE ET BEAU
    let currentPage = 'dashboard';
    
    function changerPage(page) {
        currentPage = page;
        const container = document.getElementById('main-content');
        
        if (page === 'dashboard') afficherDashboard(container);
        else if (page === 'courses') afficherCourses(container);
        else if (page === 'students') afficherStudents(container);
        else if (page === 'progress') afficherProgress(container);
        else if (page === 'quizzes') afficherQuizzes(container);
        else if (page === 'announcements') afficherAnnonces(container);
    }
    
    function afficherDashboard(container) {
        let courses = getCourses();
        let students = getStudents();
        let enrollments = getEnrollments();
        
        let coursActifs = courses.filter(c => c.statut === 'actif').length;
        let apprenantsActifs = students.filter(s => s.statut === 'actif').length;
        let tauxCompletion = enrollments.length > 0 ? Math.round((enrollments.filter(e => e.progression >= 80).length / enrollments.length) * 100) : 0;
        
        let html = `
            <h1><i class="fas fa-chart-line"></i> Tableau de bord</h1>
            <div class="stats">
                <div class="stat-card"><h2>${apprenantsActifs}</h2><p>Apprenants actifs</p></div>
                <div class="stat-card"><h2>${coursActifs}</h2><p>Cours actifs</p></div>
                <div class="stat-card"><h2>${tauxCompletion}%</h2><p>Taux de complétion</p></div>
            </div>
            <h2><i class="fas fa-book-open"></i> Mes cours</h2>
            <div class="grid">
        `;
        
        courses.slice(0, 3).forEach(c => {
            let niveauClass = c.niveau === 'Débutant' ? 'badge-debutant' : (c.niveau === 'Intermédiaire' ? 'badge-intermediaire' : 'badge-avance');
            html += `
                <div class="card">
                    <h3>${c.titre}</h3>
                    <p><i class="fas fa-chalkboard-teacher"></i> ${c.formateur} • ${c.niveau}</p>
                    <p><i class="fas fa-clock"></i> ${c.duree} • ${c.inscrits} inscrits</p>
                    <div class="progress"><div class="progress-fill" style="width: ${c.progression}%"></div></div>
                    <p style="font-size:12px">Progression: ${c.progression}%</p>
                    <span class="badge ${niveauClass}">${c.niveau}</span>
                </div>
            `;
        });
        
        html += `</div><button class="btn btn-add" onclick="changerPage('courses')"><i class="fas fa-plus"></i> Voir tous les cours</button>`;
        container.innerHTML = html;
    }
    
    function afficherCourses(container) {
        let courses = getCourses();
        let html = `<h1><i class="fas fa-book"></i> Gestion des cours</h1>
                    <button class="btn btn-add" onclick="ajouterCoursUI()"><i class="fas fa-plus"></i> Nouveau cours</button>
                    <div class="grid">`;
        
        courses.forEach(c => {
            let niveauClass = c.niveau === 'Débutant' ? 'badge-debutant' : (c.niveau === 'Intermédiaire' ? 'badge-intermediaire' : 'badge-avance');
            html += `
                <div class="card">
                    <h3>${c.titre}</h3>
                    <p>${c.description || 'Description à venir'}</p>
                    <p><i class="fas fa-chalkboard-teacher"></i> ${c.formateur}</p>
                    <p><i class="fas fa-signal"></i> Niveau: ${c.niveau}</p>
                    <p><i class="fas fa-clock"></i> ${c.duree} | <i class="fas fa-users"></i> ${c.inscrits} inscrits</p>
                    <div class="progress"><div class="progress-fill" style="width: ${c.progression}%"></div></div>
                    <span class="badge ${niveauClass}">${c.niveau}</span>
                    <button class="btn btn-danger" style="margin-top:10px" onclick="supprimerCours(${c.id}); changerPage('courses');"><i class="fas fa-trash"></i> Supprimer</button>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }
    
    function afficherStudents(container) {
        let students = getStudents();
        let html = `<h1><i class="fas fa-users"></i> Gestion des apprenants</h1>
                    <button class="btn btn-add" onclick="ajouterStudentUI()"><i class="fas fa-plus"></i> Nouvel apprenant</button>
                    <div class="grid">`;
        
        students.forEach(s => {
            html += `
                <div class="card">
                    <h3>${s.nom}</h3>
                    <p><i class="fas fa-envelope"></i> ${s.email}</p>
                    <p><i class="fas fa-users"></i> Groupe ${s.groupe}</p>
                    <p><span class="badge badge-debutant">${s.statut === 'actif' ? 'Actif' : 'Inactif'}</span></p>
                    <button class="btn btn-danger" onclick="supprimerEtudiant(${s.id}); changerPage('students');"><i class="fas fa-trash"></i> Supprimer</button>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }
    
    function afficherProgress(container) {
        let enrollments = getEnrollments();
        let courses = getCourses();
        let students = getStudents();
        
        if (enrollments.length === 0) {
            container.innerHTML = `<h1>Suivi pédagogique</h1><p>Aucune inscription pour le moment.</p><button class="btn" onclick="changerPage('students')">Inscrire des apprenants</button>`;
            return;
        }
        
        let html = `<h1><i class="fas fa-chart-line"></i> Suivi pédagogique</h1>
                    <table>
                        <tr><th>Apprenant</th><th>Cours</th><th>Progression</th><th>Score</th><th>Certificat</th></tr>`;
        
        enrollments.forEach(e => {
            let student = students.find(s => s.id === e.studentId);
            let course = courses.find(c => c.id === e.courseId);
            if (student && course) {
                let scoreClass = e.score >= 80 ? 'style="color:#28a745"' : (e.score >= 60 ? 'style="color:#ffc107"' : 'style="color:#dc3545"');
                html += `<tr>
                            <td>${student.nom}</td>
                            <td>${course.titre}</td>
                            <td><div class="progress" style="width:100px"><div class="progress-fill" style="width:${e.progression}%"></div></div> ${e.progression}%</td>
                            <td ${scoreClass}>${e.score}%</td>
                            <td>${e.certificat ? '✅ Oui' : '❌ Non'}</td>
                         </tr>`;
            }
        });
        html += `</table><button class="btn" onclick="exporterCSV()"><i class="fas fa-download"></i> Exporter CSV</button>`;
        container.innerHTML = html;
    }
    
    function afficherQuizzes(container) {
        let quizzes = getQuizzes();
        let html = `<h1><i class="fas fa-puzzle-piece"></i> Quiz & Évaluations</h1>
                    <button class="btn btn-add" onclick="ajouterQuizUI()"><i class="fas fa-plus"></i> Nouveau quiz</button>
                    <div class="grid">`;
        
        quizzes.forEach(q => {
            let cours = getCourses().find(c => c.id === q.courseId);
            html += `
                <div class="card">
                    <h3>${q.titre}</h3>
                    <p><i class="fas fa-book"></i> ${cours ? cours.titre : 'Cours général'}</p>
                    <p><i class="fas fa-clock"></i> ${q.duree} minutes | Score min: ${q.scoreMin}%</p>
                    <p><i class="fas fa-question-circle"></i> ${q.questions.length} questions</p>
                    <button class="btn" onclick="passerQuiz(${q.id})"><i class="fas fa-play"></i> Commencer</button>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }
    
    function afficherAnnonces(container) {
        let annonces = getAnnouncements();
        let html = `<h1><i class="fas fa-bullhorn"></i> Annonces</h1>
                    <button class="btn btn-add" onclick="ajouterAnnonceUI()"><i class="fas fa-plus"></i> Publier une annonce</button>
                    <div>`;
        
        annonces.forEach(a => {
            let priorityClass = a.priorite === 'urgent' ? 'annonce-urgent' : (a.priorite === 'important' ? 'annonce-important' : 'annonce');
            html += `
                <div class="${priorityClass}">
                    <h3>${a.titre}</h3>
                    <p>${a.contenu}</p>
                    <small><i class="fas fa-user"></i> ${a.auteur} - ${new Date(a.date).toLocaleDateString()}</small>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }
    
    // FONCTIONS UTILES
    function ajouterCoursUI() {
        let titre = prompt("Titre du cours ?");
        if (titre) {
            ajouterCours({ 
                titre: titre, 
                description: prompt("Description (optionnelle)") || "", 
                formateur: prompt("Nom du formateur ?") || "Admin", 
                niveau: prompt("Niveau (Débutant/Intermédiaire/Avancé) ?") || "Débutant", 
                categorie: "Général", 
                statut: "actif", 
                duree: prompt("Durée (ex: 20h) ?") || "10h", 
                inscrits: 0, 
                progression: 0, 
                modules: 1 
            });
            changerPage('courses');
        }
    }
    
    function ajouterStudentUI() {
        let nom = prompt("Nom complet de l'apprenant ?");
        if (nom) {
            ajouterEtudiant({ 
                nom: nom, 
                email: prompt("Email ?") || `${nom.replace(/ /g, '.').toLowerCase()}@email.com`, 
                groupe: prompt("Groupe (G1, G2...) ?") || "G1", 
                statut: "actif", 
                avatar: "https://randomuser.me/api/portraits/lego/1.jpg" 
            });
            changerPage('students');
        }
    }
    
    function ajouterAnnonceUI() {
        let titre = prompt("Titre de l'annonce ?");
        if (titre) {
            ajouterAnnonce({ 
                titre: titre, 
                contenu: prompt("Contenu de l'annonce ?") || "", 
                priorite: prompt("Priorité (normal/important/urgent) ?") || "normal", 
                auteur: "Administrateur", 
                coursId: null 
            });
            changerPage('announcements');
        }
    }
    
    function ajouterQuizUI() {
        alert("Fonctionnalité d'ajout de quiz à venir. Utilisez les données par défaut pour l'instant.");
    }
    
    function passerQuiz(id) {
        alert(`Quiz #${id} lancé ! Fonctionnalité complète bientôt disponible.`);
    }
    
    function exporterCSV() {
        let enrollments = getEnrollments();
        let courses = getCourses();
        let students = getStudents();
        let csv = "Apprenant;Cours;Progression;Score;Certificat\n";
        
        enrollments.forEach(e => {
            let student = students.find(s => s.id === e.studentId);
            let course = courses.find(c => c.id === e.courseId);
            if (student && course) {
                csv += `${student.nom};${course.titre};${e.progression}%;${e.score}%;${e.certificat ? "Oui" : "Non"}\n`;
            }
        });
        
        let blob = new Blob([csv], { type: 'text/csv' });
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'suivi_pedagogique.csv';
        link.click();
        URL.revokeObjectURL(link.href);
    }
    
    // Exposer les fonctions globales
    window.changerPage = changerPage;
    window.ajouterCoursUI = ajouterCoursUI;
    window.ajouterStudentUI = ajouterStudentUI;
    window.ajouterAnnonceUI = ajouterAnnonceUI;
    window.ajouterQuizUI = ajouterQuizUI;
    window.passerQuiz = passerQuiz;
    window.exporterCSV = exporterCSV;
    window.supprimerCours = supprimerCours;
    window.supprimerEtudiant = supprimerEtudiant;
    
    // Démarrage
    changerPage('dashboard');
</script>
</body>
</html>
